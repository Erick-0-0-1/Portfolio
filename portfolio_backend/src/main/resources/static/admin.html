<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Contact Messages</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #F5C518;
      --bg: #080808;
      --surface: #101010;
      --surface2: #161616;
      --border: rgba(255,255,255,0.07);
      --text: #f0f0f0;
      --muted: #666;
      --red: #ef4444;
      --green: #22c55e;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg); color: var(--text);
      font-family: 'Syne', sans-serif; min-height: 100vh;
    }

    /* ── LOGIN SCREEN ── */
    #login-screen {
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
    }
    .login-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 1.5rem; padding: 3rem 2.5rem; width: 100%; max-width: 400px;
      display: flex; flex-direction: column; gap: 1.5rem;
    }
    .login-logo {
      font-size: .75rem; font-weight: 700; letter-spacing: .2em;
      text-transform: uppercase; color: var(--gold);
      display: flex; align-items: center; gap: .5rem;
    }
    .login-title { font-size: 1.8rem; font-weight: 800; }
    .login-sub {
      font-family: 'DM Mono', monospace; font-size: .75rem; color: var(--muted);
    }
    .login-input {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: .75rem; padding: .9rem 1.1rem;
      color: var(--text); font-family: 'DM Mono', monospace; font-size: .85rem;
      outline: none; width: 100%;
      transition: border-color .3s;
    }
    .login-input:focus { border-color: var(--gold); }
    .login-btn {
      padding: .9rem; background: var(--gold); color: #000;
      border: none; border-radius: 2rem; cursor: pointer;
      font-family: 'Syne', sans-serif; font-size: .85rem; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      transition: opacity .2s;
    }
    .login-btn:hover { opacity: .85; }
    .login-error {
      font-family: 'DM Mono', monospace; font-size: .72rem;
      color: var(--red); text-align: center; display: none;
    }

    /* ── ADMIN PANEL ── */
    #admin-panel { display: none; }

    header {
      padding: 1.2rem 2.5rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(8,8,8,.9); backdrop-filter: blur(16px);
      position: sticky; top: 0; z-index: 10;
    }
    .header-logo {
      font-size: .78rem; font-weight: 700; letter-spacing: .18em;
      text-transform: uppercase; display: flex; align-items: center; gap: .5rem;
    }
    .header-logo span { color: var(--gold); }
    .header-right { display: flex; align-items: center; gap: 1.5rem; }
    .msg-count {
      font-family: 'DM Mono', monospace; font-size: .7rem; color: var(--muted);
    }
    .msg-count b { color: var(--gold); }
    .logout-btn {
      font-family: 'DM Mono', monospace; font-size: .7rem;
      color: var(--muted); background: none; border: 1px solid var(--border);
      padding: .4rem .9rem; border-radius: 2rem; cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .logout-btn:hover { border-color: var(--red); color: var(--red); }

    main { padding: 2.5rem; max-width: 1100px; margin: 0 auto; }

    .stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1px; background: var(--border);
      border: 1px solid var(--border); border-radius: 1rem; overflow: hidden;
      margin-bottom: 2.5rem;
    }
    .stat-card { background: var(--surface); padding: 1.4rem 1.8rem; }
    .stat-card .num {
      font-size: 2rem; font-weight: 800; color: var(--gold); line-height: 1;
      margin-bottom: .3rem;
    }
    .stat-card .lbl {
      font-family: 'DM Mono', monospace; font-size: .65rem;
      color: var(--muted); letter-spacing: .1em; text-transform: uppercase;
    }

    .section-label {
      font-family: 'DM Mono', monospace; font-size: .7rem;
      color: var(--gold); letter-spacing: .18em; text-transform: uppercase;
      margin-bottom: 1.2rem;
    }

    /* Messages list */
    #messages-list { display: flex; flex-direction: column; gap: 1px; }

    .msg-card {
      background: var(--surface);
      border: 1px solid var(--border); border-radius: 1rem;
      padding: 1.6rem 1.8rem; margin-bottom: 1px;
      display: grid; grid-template-columns: 1fr auto;
      gap: 1rem; align-items: start;
      transition: background .2s;
      animation: fadeIn .4s ease;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .msg-card:hover { background: var(--surface2); }

    .msg-header { display: flex; align-items: center; gap: 1rem; margin-bottom: .8rem; flex-wrap: wrap; }
    .msg-name { font-size: 1rem; font-weight: 700; }
    .msg-email {
      font-family: 'DM Mono', monospace; font-size: .7rem;
      color: var(--gold); letter-spacing: .05em;
    }
    .msg-date {
      font-family: 'DM Mono', monospace; font-size: .65rem;
      color: var(--muted); margin-left: auto;
    }
    .msg-body {
      font-family: 'DM Mono', monospace; font-size: .78rem;
      color: #999; line-height: 1.8;
    }
    .delete-btn {
      background: none; border: 1px solid var(--border);
      color: var(--muted); padding: .4rem .8rem; border-radius: .5rem;
      font-family: 'DM Mono', monospace; font-size: .65rem;
      cursor: pointer; letter-spacing: .05em; text-transform: uppercase;
      transition: border-color .2s, color .2s, background .2s;
      white-space: nowrap;
    }
    .delete-btn:hover { border-color: var(--red); color: var(--red); background: rgba(239,68,68,.06); }

    /* Empty / loading states */
    .state-msg {
      font-family: 'DM Mono', monospace; font-size: .8rem;
      color: var(--muted); text-align: center; padding: 4rem;
      border: 1px dashed var(--border); border-radius: 1rem;
    }
    .state-msg span { display: block; font-size: 2rem; margin-bottom: 1rem; }

    /* Toast */
    #toast {
      position: fixed; bottom: 2rem; right: 2rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: .75rem; padding: .8rem 1.4rem;
      font-family: 'DM Mono', monospace; font-size: .75rem;
      opacity: 0; transform: translateY(8px);
      transition: opacity .3s, transform .3s;
      pointer-events: none; z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { border-color: var(--green); color: var(--green); }
    #toast.error   { border-color: var(--red);   color: var(--red); }
  </style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo"><span>✦</span> ERJ PORTFOLIO</div>
    <div>
      <h1 class="login-title">Admin Access</h1>
      <p class="login-sub" style="margin-top:.5rem">Enter your admin key to view messages.</p>
    </div>
    <input type="password" class="login-input" id="key-input"
           placeholder="Enter admin key..." onkeydown="if(event.key==='Enter')login()"/>
    <button class="login-btn" onclick="login()">Unlock Dashboard</button>
    <p class="login-error" id="login-error">❌ Invalid admin key. Try again.</p>
  </div>
</div>

<!-- ── ADMIN PANEL ── -->
<div id="admin-panel">
  <header>
    <div class="header-logo"><span>✦</span> ADMIN DASHBOARD</div>
    <div class="header-right">
      <div class="msg-count">Total: <b id="total-count">—</b> messages</div>
      <button class="logout-btn" onclick="logout()">Log Out</button>
    </div>
  </header>

  <main>
    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="num" id="stat-total">0</div>
        <div class="lbl">Total Messages</div>
      </div>
      <div class="stat-card">
        <div class="num" id="stat-today">0</div>
        <div class="lbl">Received Today</div>
      </div>
      <div class="stat-card">
        <div class="num" id="stat-latest">—</div>
        <div class="lbl">Latest Sender</div>
      </div>
    </div>

    <div class="section-label">// Inbox — Contact Messages</div>
    <div id="messages-list">
      <div class="state-msg"><span>⏳</span>Loading messages...</div>
    </div>
  </main>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>echo WORKDIR /app >> Dockerfile
const API = window.location.hostname === 'localhost'
    ? 'http://localhost:8080/api/contact'
    : 'https://portfolio-1-4pkm.onrender.com';
  let ADMIN_KEY = '';

  // ── Login ────────────────────────────────────────────────
  async function login() {
    const key = document.getElementById('key-input').value.trim();
    if (!key) return;

    try {
      const res = await fetch(API, {
        headers: { 'X-Admin-Key': key }
      });

      if (res.status === 401) {
        document.getElementById('login-error').style.display = 'block';
        return;
      }

      ADMIN_KEY = key;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-panel').style.display = 'block';
      loadMessages();

    } catch (e) {
      document.getElementById('login-error').textContent = '⚠️ Cannot reach backend. Is Spring Boot running?';
      document.getElementById('login-error').style.display = 'block';
    }
  }

  function logout() {
    ADMIN_KEY = '';
    document.getElementById('admin-panel').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('key-input').value = '';
    document.getElementById('login-error').style.display = 'none';
  }

  // ── Load Messages ────────────────────────────────────────
  async function loadMessages() {
    const list = document.getElementById('messages-list');

    try {
      const res  = await fetch(API, { headers: { 'X-Admin-Key': ADMIN_KEY } });
      const msgs = await res.json();

      // Stats
      const today = new Date().toDateString();
      const todayCount = msgs.filter(m =>
        new Date(m.sentAt).toDateString() === today
      ).length;

      document.getElementById('stat-total').textContent  = msgs.length;
      document.getElementById('stat-today').textContent  = todayCount;
      document.getElementById('stat-latest').textContent = msgs.length ? msgs[0].name.split(' ')[0] : '—';
      document.getElementById('total-count').textContent = msgs.length;

      if (msgs.length === 0) {
        list.innerHTML = '<div class="state-msg"><span>📭</span>No messages yet. Share your portfolio!</div>';
        return;
      }

      list.innerHTML = msgs.map(m => `
        <div class="msg-card" id="card-${m.id}">
          <div>
            <div class="msg-header">
              <span class="msg-name">${escHtml(m.name)}</span>
              <span class="msg-email">${escHtml(m.email)}</span>
              <span class="msg-date">${formatDate(m.sentAt)}</span>
            </div>
            <p class="msg-body">${escHtml(m.message)}</p>
          </div>
          <button class="delete-btn" onclick="deleteMsg(${m.id})">Delete</button>
        </div>
      `).join('');

    } catch (e) {
      list.innerHTML = '<div class="state-msg"><span>⚠️</span>Failed to load. Check backend connection.</div>';
    }
  }

  // ── Delete Message ───────────────────────────────────────
  async function deleteMsg(id) {
    if (!confirm('Delete this message? This cannot be undone.')) return;

    try {
        const res = await fetch(`${API}/${id}?key=${ADMIN_KEY}`, {
            method: 'DELETE'
        });

        if (res.ok) {
            const card = document.getElementById(`card-${id}`);
            card.style.opacity = '0';
            card.style.transform = 'translateX(20px)';
            card.style.transition = 'opacity .3s, transform .3s';
            setTimeout(() => { card.remove(); loadMessages(); }, 350);
            showToast('Message deleted ✓', 'success');
        } else {
            showToast('Delete failed. Try again.', 'error');
        }
    } catch (e) {
        showToast('Network error.', 'error');
    }
}

  // ── Helpers ──────────────────────────────────────────────
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
              .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
  }

  function formatDate(iso) {
    return new Date(iso).toLocaleString('en-PH', {
      month: 'short', day: 'numeric', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type}`;
    setTimeout(() => t.className = '', 3000);
  }
</script>
</body>
</html>
