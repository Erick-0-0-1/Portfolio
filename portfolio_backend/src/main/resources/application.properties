# Use PORT from environment, fallback to 8080 locally
server.port=${PORT:8080}

# Database configuration using environment variables
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/portfolio_db}
spring.datasource.username=${JDBC_DATABASE_USERNAME:postgres}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:Vrenjers001}

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
